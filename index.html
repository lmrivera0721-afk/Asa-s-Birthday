<!doctype html>
<!-- redeploy-trigger: 2026-06-27T21:24:30Z -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Happy Birthday — Pastel Treasure Hunt</title>
<style>
  :root{
    --bg-start: #fffafc;
    --bg-end: #f8f6ff;
    --accent-pink:#ff9fca;
    --accent-lilac:#d8b4ff;
    --card:#ffffffee;
    --text:#2b1b2b;
    --muted:#6b5564;
  }
  html,body{height:100%;margin:0;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;color:var(--text);background:linear-gradient(180deg,var(--bg-start),var(--bg-end));}
  .container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
  .card{width:min(980px,96vw);max-width:980px;padding:18px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,0.96),rgba(255,255,255,0.9));box-shadow:0 14px 40px rgba(20,10,20,0.06);display:grid;grid-template-columns:1fr 380px;gap:18px}
  .left{padding:8px 18px}
  h1{margin:0 0 8px;font-size:2rem}
  .lead{color:var(--muted);margin:0 0 12px}
  .btn{display:inline-flex;gap:8px;align-items:center;padding:10px 14px;border-radius:12px;border:0;background:var(--accent-pink);color:white;font-weight:700;cursor:pointer}
  .small{padding:8px 10px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);background:white;cursor:pointer}
  .right{padding:12px;background:linear-gradient(135deg,rgba(255,250,255,0.85),rgba(250,250,255,0.8));border-radius:12px}
  .photo{width:100%;height:220px;border-radius:12px;background:linear-gradient(180deg,#ffdff6,#f6f7ff);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .photo img{width:100%;height:100%;object-fit:cover}
  .huntPanel{margin-top:14px;border-radius:12px;padding:12px;background:linear-gradient(180deg,#fff,#fff0);border:1px dashed rgba(200,150,190,0.08)}
  .stepHeader{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .progress{font-weight:700;color:var(--muted)}
  .clue{margin:8px 0;padding:12px;border-radius:10px;background:linear-gradient(90deg,#fff,#fffaf2);border:1px solid rgba(200,150,190,0.06)}
  .inputRow{display:flex;gap:8px;align-items:center;margin-top:10px}
  input[type="text"]{padding:10px;border-radius:10px;border:1px solid rgba(180,140,160,0.12);flex:1}
  .hint{margin-top:8px;color:#6b5564;font-size:0.95rem}
  .badge{background:linear-gradient(90deg,var(--accent-lilac),var(--accent-pink));color:white;padding:6px 8px;border-radius:999px;font-weight:800}
  .finalTreasure{padding:14px;border-radius:12px;background:linear-gradient(90deg,#f6e7ff,#fff0f6);text-align:center}
  .muted{color:var(--muted)}
  .smallText{font-size:0.9rem;color:var(--muted)}
  @media(max-width:940px){.card{grid-template-columns:1fr}}
  /* confetti canvas covers */
  #confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:40}
</style>
</head>
<body>
  <canvas id="confettiCanvas"></canvas>
  <div class="container">
    <div class="card" role="main" aria-label="Birthday treasure hunt card">
      <div class="left">
        <h1 id="title">Happy Birthday, Love! 🎉</h1>
        <p class="lead" id="subtitle">Ready for a treasure hunt? Click Start Hunt and follow the clues to reach your surprise.</p>

        <div style="display:flex;gap:12px;align-items:center">
          <button id="startHunt" class="btn">Start Treasure Hunt</button>
          <button id="openSurprise" class="btn" style="background:linear-gradient(90deg,var(--accent-lilac),var(--accent-pink))">Open Surprise</button>
        </div>

        <div id="huntArea" class="huntPanel" style="display:none">
          <div class="stepHeader">
            <div>Treasure Hunt <span class="smallText">— follow the steps</span></div>
            <div class="progress" id="progressText">Step 0 / 0</div>
          </div>

          <div id="stepBox">
            <!-- step content injected here -->
          </div>

          <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
            <button id="hintBtn" class="small">Show Hint</button>
            <button id="skipBtn" class="small">Skip Step</button>
            <div style="margin-left:auto" class="smallText">Hints left: <span id="hintsLeft">0</span></div>
          </div>

          <div id="huntControls" style="display:none;margin-top:10px;justify-content:flex-end">
            <button id="resetHunt" class="small">Reset Hunt</button>
          </div>

        </div>

        <p class="smallText" style="margin-top:12px">You can customize steps inside the TREASURE_STEPS array in the script. Progress is saved locally.</p>
      </div>

      <aside class="right">
        <div class="photo" id="photoFrame" title="Click to open slideshow">
          <img id="mainPhoto" alt="photo" src="" />
        </div>

        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button id="prevSlide" class="small">Prev</button>
          <button id="nextSlide" class="small">Next</button>
          <button id="secretBtn" class="small">Secret Note</button>
        </div>

        <div style="margin-top:12px">
          <div class="muted">Treasure progress</div>
          <div id="progressDots" style="margin-top:8px;display:flex;gap:6px"></div>
        </div>
      </aside>
    </div>
  </div>

<script>
/* ============== CONFIG - Customize treasure steps here ==============

Step types supported:
 - riddle: {type:'riddle', text:'Riddle text', answer:'lowercase-answer', hint:'hint text'}
 - photo:  {type:'photo', text:'Which photo...', index: number (0-based), hint:'hint text'}
 - quiz:   {type:'quiz', text:'Question', choices:[], answerIndex:0, hint:''}
 - anagram:{type:'anagram', text:'Unscramble', scrambled:'gibber', answer:'word', hint:''}
 - final:  {type:'final', text:'Enter the final phrase', answer:'secret phrase'}

Keep answers in lowercase (checking normalizes).
*/
const RECIPIENT_NAME = "Asante";
const SURPRISE_MESSAGE = `happy birthday, my loveeeeeeee, I hope you're having the most amazing day and I hope you know you're amazing in every way and I so glad I get to have you in my life <3`;

const TREASURE_STEPS = [
  {type:'riddle', text:"Riddle: I follow you day and night but only when the sun is bright. What am I?", answer:"shadow", hint:"It's attached to your feet."},
  {type:'photo', text:"Find the photo with the golden sunset (click the correct image in the slideshow).", index:2, hint:"Look for warm orange light."},
  {type:'quiz', text:"What's the thing he always asks for at breakfast?", choices:["Pancakes","Coffee","Bacon","Extra nap"], answerIndex:1, hint:"He needs a morning boost."},
  {type:'anagram', text:"Unscramble this to make the place we first kissed: 'pleaer' (6 letters).", scrambled:"pleaer", answer:"pearle", hint:"Try rearranging — it's 'pearle' spelled oddly (you can customize)."},
  {type:'final', text:"Final secret: enter the special phrase to open the treasure (two words).", answer:"forever mine", hint:"A short romantic phrase, two words."}
];

const MAX_HINTS = 3; // how many hints a player can use overall

/* ================================================================== */
document.getElementById('title').textContent = `Happy Birthday, ${RECIPIENT_NAME}! 🎉`;
document.getElementById('subtitle').textContent = SURPRISE_MESSAGE;
document.getElementById('secretBtn').addEventListener('click', ()=> {
  alert(SURPRISE_MESSAGE);
});

/* Basic slideshow used by photo step - replace SLIDES with your images */
const SLIDES = [
  "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=1200&q=80&auto=format&fit=crop",
  "https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?w=1200&q=80&auto=format&fit=crop",
  "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=1200&q=80&auto=format&fit=crop"
];
let currentSlide = 0;
const mainPhoto = document.getElementById('mainPhoto');
function showSlide(i){
  if(!SLIDES || SLIDES.length===0){ mainPhoto.src=""; return; }
  currentSlide = (i + SLIDES.length) % SLIDES.length;
  mainPhoto.src = SLIDES[currentSlide];
}
showSlide(0);
document.getElementById('nextSlide').addEventListener('click', ()=> showSlide(currentSlide+1));
document.getElementById('prevSlide').addEventListener('click', ()=> showSlide(currentSlide-1));
document.getElementById('photoFrame').addEventListener('click', ()=> showSlide(currentSlide+1));

/* Confetti utilities (re-used) */
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
function resizeCanvas(){ dpr = window.devicePixelRatio || 1; canvas.width = innerWidth * dpr; canvas.height = innerHeight * dpr; canvas.style.width = innerWidth+'px'; canvas.style.height = innerHeight+'px'; ctx.setTransform(dpr,0,0,dpr,0,0);}
resizeCanvas(); addEventListener('resize', resizeCanvas);
let confetti = [];
function makeConfetti(x,y,colorHints){
  const colors = colorHints || ['#2b0b1f','#3b1b3f','#8f6bc9','#d8b4ff','#ffbfe3'];
  for(let i=0;i<90;i++){
    confetti.push({x:x + (Math.random()-0.5)*120, y:y + (Math.random()-0.5)*60, vx:(Math.random()-0.5)*6, vy:Math.random()*6-2, size:6+Math.random()*12, rot:Math.random()*360, spin:(Math.random()-0.5)*8, color:colors[Math.floor(Math.random()*colors.length)], life:80+Math.random()*80});
  }
}
function confettiLoop(){
  ctx.clearRect(0,0,innerWidth,innerHeight);
  for(let i=confetti.length-1;i>=0;i--){
    const p = confetti[i];
    p.vy += 0.16; p.x += p.vx; p.y += p.vy; p.rot += p.spin; p.life--;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6); ctx.restore();
    if(p.y > innerHeight + 60 || p.life<=0) confetti.splice(i,1);
  }
  requestAnimationFrame(confettiLoop);
}
confettiLoop();

/* Treasure hunt state */
const totalSteps = TREASURE_STEPS.length;
let state = {
  current: 0,
  completed: new Array(totalSteps).fill(false),
  hintsUsed: 0
};
const STORAGE_KEY = 'pastel_treasure_state_v1';

function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function loadState(){ try{ const s = JSON.parse(localStorage.getItem(STORAGE_KEY)); if(s && typeof s.current==='number') state = s; }catch(e){} }
loadState();

/* UI elements */
const startBtn = document.getElementById('startHunt');
const huntArea = document.getElementById('huntArea');
const stepBox = document.getElementById('stepBox');
const progressText = document.getElementById('progressText');
const hintsLeftEl = document.getElementById('hintsLeft');
const hintBtn = document.getElementById('hintBtn');
const skipBtn = document.getElementById('skipBtn');
const progressDots = document.getElementById('progressDots');
const resetHunt = document.getElementById('resetHunt');
const huntControls = document.getElementById('huntControls');
const openSurprise = document.getElementById('openSurprise');

hintsLeftEl.textContent = Math.max(0, MAX_HINTS - state.hintsUsed);
progressDots.innerHTML = '';
for(let i=0;i<totalSteps;i++){
  const d = document.createElement('div'); d.style.width='14px'; d.style.height='14px'; d.style.borderRadius='999px'; d.style.background = state.completed[i] ? 'linear-gradient(90deg,var(--accent-lilac),var(--accent-pink))' : '#eee'; progressDots.appendChild(d);
}

function renderProgress(){ progressText.textContent = `Step ${state.current+1} / ${totalSteps}`; hintsLeftEl.textContent = Math.max(0, MAX_HINTS - state.hintsUsed); // dots
  const children = progressDots.children; for(let i=0;i<children.length;i++){ children[i].style.background = state.completed[i] ? 'linear-gradient(90deg,#d6b3ff,#ff9fb3)' : '#eee'; } }
renderProgress();

/* Step rendering and checking */
function normalize(s){ return (s||'').trim().toLowerCase(); }

function showStep(){
  const step = TREASURE_STEPS[state.current];
  stepBox.innerHTML = '';
  const titleWrap = document.createElement('div'); titleWrap.style.display='flex'; titleWrap.style.justifyContent='space-between'; titleWrap.style.alignItems='center';
  const title = document.createElement('div'); title.textContent = `Clue ${state.current+1}`; title.style.fontWeight='800';
  const badge = document.createElement('div'); badge.className='badge'; badge.style.fontSize='0.85rem'; badge.textContent = step.type.toUpperCase();
  titleWrap.appendChild(title); titleWrap.appendChild(badge);
  stepBox.appendChild(titleWrap);

  const clue = document.createElement('div'); clue.className='clue'; clue.textContent = step.text;
  stepBox.appendChild(clue);

  // dynamic content per type
  if(step.type === 'riddle' || step.type === 'final' || step.type === 'anagram'){
    const inputRow = document.createElement('div'); inputRow.className='inputRow';
    const input = document.createElement('input'); input.type='text'; input.placeholder = 'Type your answer here';
    inputRow.appendChild(input);
    const submit = document.createElement('button'); submit.className='small'; submit.textContent = 'Submit';
    inputRow.appendChild(submit);
    stepBox.appendChild(inputRow);
    const status = document.createElement('div'); status.className='hint'; stepBox.appendChild(status);

    submit.addEventListener('click', ()=> {
      const attempt = normalize(input.value);
      const expected = normalize(step.answer);
      if(step.type === 'anagram'){
        // accept both unscrambled answer or exact match
        if(attempt === expected){
          markComplete();
        } else {
          status.textContent = "Not quite — try rearranging the letters.";
        }
      } else {
        if(attempt === expected){
          markComplete();
        } else {
          status.textContent = "That's not it. Try again or use a hint.";
        }
      }
    });

    input.addEventListener('keyup', (e)=> { if(e.key === 'Enter') submit.click(); });
  } else if(step.type === 'photo'){
    const info = document.createElement('div'); info.className='smallText'; info.textContent = 'Click the slideshow photo (right) that matches the clue.';
    stepBox.appendChild(info);
    const status = document.createElement('div'); status.className='hint'; stepBox.appendChild(status);
    // photo selection handled by click on slideshow: listen for photo clicks
    const clickHandler = ()=> {
      if(currentSlide === (step.index || 0)){
        markComplete();
        status.textContent = "Nice! That's the one.";
      } else {
        status.textContent = "Not this one — try another photo.";
      }
    };
    document.getElementById('photoFrame').addEventListener('click', clickHandler, {once:true});
  } else if(step.type === 'quiz'){
    const choicesWrap = document.createElement('div'); choicesWrap.style.display='flex'; choicesWrap.style.flexDirection='column'; choicesWrap.style.gap='8px';
    (step.choices||[]).forEach((c,ci)=>{
      const btn = document.createElement('button'); btn.className='small'; btn.textContent = c;
      btn.addEventListener('click', ()=> {
        if(ci === step.answerIndex){
          markComplete();
        } else {
          const s = document.createElement('div'); s.className='hint'; s.textContent = 'Close — try again or use a hint.';
          stepBox.appendChild(s);
        }
      });
      choicesWrap.appendChild(btn);
    });
    stepBox.appendChild(choicesWrap);
  }
  // show controls
  document.getElementById('huntControls').style.display = 'flex';
  renderProgress();
  saveState();
}

function markComplete(){
  state.completed[state.current] = true;
  // visual feedback
  createBigMessage(`Clue ${state.current+1} complete! 🎉`);
  // quick confetti
  makeConfetti(innerWidth/2, innerHeight/3, ['#3b1b3f','#8f6bc9','#d8b4ff']);
  // advance to next
  if(state.current < totalSteps - 1){
    state.current++;
    showStep();
  } else {
    // finished
    showTreasure();
  }
  saveState();
}

/* hints and skip */
hintBtn.addEventListener('click', ()=>{
  if(state.hintsUsed >= MAX_HINTS){ alert('No hints left.'); return; }
  const step = TREASURE_STEPS[state.current];
  state.hintsUsed++;
  saveState();
  createBigMessage('Hint: ' + (step.hint || 'No hint available for this step'));
  renderProgress();
});
skipBtn.addEventListener('click', ()=>{
  if(!confirm('Skip this step? You will mark it as completed.')) return;
  state.completed[state.current] = true;
  if(state.current < totalSteps - 1) state.current++;
  saveState();
  showStep();
});

/* reset */
resetHunt.addEventListener('click', ()=>{
  if(!confirm('Reset the treasure hunt and start over?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {current:0, completed:new Array(totalSteps).fill(false), hintsUsed:0};
  saveState(); showStep();
});

/* starting the hunt */
startBtn.addEventListener('click', ()=>{
  huntArea.style.display = 'block';
  showStep();
});

/* final treasure reveal */
function showTreasure(){
  stepBox.innerHTML = '';
  const t = document.createElement('div'); t.className='finalTreasure';
  t.innerHTML = `<h2>You've found the treasure! 🖤💜</h2><p class="smallText">Click the button to reveal your surprise.</p><div style="margin-top:12px"><button id="revealTreasure" class="btn">Reveal Treasure</button></div>`;
  stepBox.appendChild(t);
  document.getElementById('revealTreasure').addEventListener('click', ()=> {
    // show big secret modal and confetti
    createBigMessage('Treasure opened — I love you! 💜');
    makeConfetti(innerWidth/2, innerHeight/2, ['#2b0b1f','#3b1b3f','#8f6bc9']);
    // reuse the secret modal
    alert('Surprise! ' + SURPRISE_MESSAGE);
    // mark all completed and save
    for(let i=0;i<totalSteps;i++) state.completed[i]=true;
    saveState();
    renderProgress();
  });
}

/* decorative big message (re-used) */
function createBigMessage(text){
  const el = document.createElement('div');
  el.style.position='fixed'; el.style.left='50%'; el.style.top='16%'; el.style.transform='translateX(-50%)'; el.style.padding='12px 18px';
  el.style.borderRadius='12px'; el.style.background='linear-gradient(90deg,#fff,#fff0)'; el.style.boxShadow='0 12px 36px rgba(10,6,12,0.12)'; el.style.zIndex=9999; el.style.fontWeight=800;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=> { el.style.transition='all 700ms'; el.style.opacity=0; el.style.transform='translateX(-50%) translateY(-26px)'; }, 2000);
  setTimeout(()=> el.remove(), 2800);
}

/* initial UI state */
if(state.current > 0 && state.current < totalSteps) {
  huntArea.style.display = 'block';
  showStep();
}

/* open surprise button uses existing palette of actions (confetti + alert) */
openSurprise.addEventListener('click', ()=> {
  makeConfetti(innerWidth/2, innerHeight/2);
  createBigMessage(`${RECIPIENT_NAME}, this is your surprise! ❤️`);
  alert(SURPRISE_MESSAGE);
});

/* small accessibility: focus start button on load */
startBtn.focus();
</script>
</body>
</html>
